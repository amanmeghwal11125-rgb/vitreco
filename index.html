<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitreco | High-End Wallpapers</title>
  
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dtjkyb8lt/image/upload/w_64,h_64,q_auto,f_auto/logo_oopcyd">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ambient-bg">
    <div class="light-orb"></div>
  </div>

  <nav class="floating-nav">
    <div class="logo">Vitreco.</div>
    <div class="nav-links">
      <button class="active" onclick="switchCategory('Desktop', this)">Desktop</button>
      <button onclick="switchCategory('Mobile', this)">Mobile</button>
    </div>
  </nav>

  <main class="container">
    <header class="hero">
      <h1>Elevate Your Screen</h1>
      <p>Premium wallpapers streamed directly from Cloudinary.</p>
    </header>

    <section class="gallery-grid" id="gallery"></section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      
      <div class="profile-wrapper">
        <img src="https://res.cloudinary.com/dtjkyb8lt/image/upload/w_200,h_200,c_fill,g_face,q_auto,f_auto/Aman_Meghwal_wu4bax" alt="Aman Meghwal" class="profile-pic">
      </div>
      
      <h2>Aman Meghwal</h2>
      <p>Hey, I'm a 19-year-old student from Rajasthan. I create and curate high-end digital art and wallpapers. Every piece here is handpicked to make your screen look incredibly premium.</p>
      
      <div class="social-links">
        <a href="https://instagram.com/aman_meghwal7" target="_blank" class="insta-btn" aria-label="Follow on Instagram">
          <div class="insta-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </div>
          <span class="insta-username">aman_meghwal7</span>
        </a>
      </div>
      
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
